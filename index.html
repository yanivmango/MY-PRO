<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>סורק כביסה בעל למידה עצמית דינמית</title>
    <!-- טעינת ספריות TensorFlow.js, MobileNet ו-KNN Classifier -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.22.0/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/mobilenet@2.1.0/dist/mobilenet.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/knn-classifier@1.2.4/dist/knn-classifier.min.js"></script>
    
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            text-align: center;
            background: #f1f5f9;
            margin: 0;
            padding: 15px;
            color: #1e293b;
        }
        .container {
            max-width: 500px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
            position: relative;
        }
        h1 { font-size: 1.4rem; margin-bottom: 5px; color: #0f172a; }
        p { color: #64748b; font-size: 0.9rem; margin-top: 0; }
        
        .video-container {
            position: relative;
            width: 100%;
            max-width: 500px;
            margin: 10px auto;
            border-radius: 12px;
            overflow: hidden;
        }
        video {
            width: 100%;
            display: block;
            background: #000;
        }
        .crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 16px;
            height: 16px;
            transform: translate(-50%, -50%);
            border: 3px solid #ef4444;
            border-radius: 50%;
            background: rgba(239, 68, 68, 0.4);
            pointer-events: none;
            box-shadow: 0 0 8px rgba(239, 68, 68, 0.8);
        }

        .loading-overlay {
            background: #f8fafc;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 15px;
            font-weight: bold;
            color: #2563eb;
            border: 1px solid #e2e8f0;
        }
        
        .detection-card {
            background: #f8fafc;
            padding: 15px;
            border-radius: 10px;
            margin: 15px 0;
            border: 1.5px solid #cbd5e1;
        }

        .category-text {
            font-size: 1.6rem;
            font-weight: bold;
            color: #16a34a;
            margin: 5px 0;
        }

        .raw-text {
            font-size: 0.9rem;
            color: #64748b;
        }

        .toggle-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            background: #f8fafc;
            border-radius: 8px;
            margin-top: 10px;
            border: 1px solid #e2e8f0;
        }

        /* מודאל דינמי מתכוונן המאפשר גלילה */
        .modal {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 23, 42, 0.93);
            border-radius: 15px;
            z-index: 10;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            padding: 15px;
            box-sizing: border-box;
        }
        .modal-title {
            font-size: 1.1rem;
            font-weight: bold;
            margin-bottom: 12px;
            color: #38bdf8;
            padding: 0 10px;
        }
        .modal-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            width: 100%;
            max-width: 380px;
            max-height: 280px; /* הגבלת גובה כדי לא לחרוג ממסך הטלפון */
            overflow-y: auto; /* מאפשר גלילה אם יש הרבה קטגוריות */
            padding-right: 5px;
        }
        .modal-btn {
            padding: 12px;
            font-size: 0.95rem;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            color: white;
            transition: opacity 0.15s;
        }
        .modal-btn:active { opacity: 0.8; }

        .log-box {
            background: #0f172a;
            color: #38bdf8;
            padding: 10px;
            border-radius: 8px;
            height: 80px;
            overflow-y: auto;
            text-align: left;
            font-family: monospace;
            font-size: 0.8rem;
            margin-top: 15px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>סורק כביסה - למידה עצמית דינמית</h1>
    <p>כוון את העיגול האדום למרכז הבגד. תוכל להוסיף קטגוריות מותאמות אישית!</p>

    <!-- מודאל למידה אקטיבי עם כפתורים דינמיים -->
    <div id="manualModal" class="modal">
        <div class="modal-title">לא זוהה פריט ודאי. בחר קטגוריה ללימוד או הוסף חדשה:</div>
        <div class="modal-buttons" id="modalButtonsContainer">
            <!-- הכפתורים ייווצרו כאן באופן דינמי באמצעות JavaScript -->
        </div>
    </div>

    <div id="loader" class="loading-overlay">
        ⏳ מאתחל מערכת בינה מלאכותית ולמידה עצמית...
    </div>

    <div class="video-container">
        <video id="webcam" autoplay playsinline muted style="display: none;"></video>
        <div class="crosshair" id="targetDot" style="display: none;"></div>
    </div>
    
    <div class="detection-card" id="detectionArea" style="display: none;">
        <div>סטטוס זיהוי:</div>
        <div class="category-text" id="mappedCategory">ממתין לפריט...</div>
        <div class="raw-text" id="rawOutput">זיהוי גולמי: -</div>
    </div>

    <div class="toggle-container">
        <span>📸 שמירה אוטומטית בזיהוי ודאי:</span>
        <input type="checkbox" id="autoSaveToggle" style="transform: scale(1.3); cursor: pointer;" checked>
    </div>

    <div class="log-box" id="log"></div>
</div>

<script>
    const video = document.getElementById('webcam');
    const targetDot = document.getElementById('targetDot');
    const loader = document.getElementById('loader');
    const detectionArea = document.getElementById('detectionArea');
    const mappedCategoryText = document.getElementById('mappedCategory');
    const rawOutputText = document.getElementById('rawOutput');
    const autoSaveToggle = document.getElementById('autoSaveToggle');
    const manualModal = document.getElementById('manualModal');
    const modalButtonsContainer = document.getElementById('modalButtonsContainer');
    const logBox = document.getElementById('log');

    let model = null;
    let knn = null; 
    let isPaused = false;
    let lastSavedClass = "";
    let lastSaveTime = 0;
    let lastLaundryDetectedTime = Date.now(); 
    const SAVE_COOLDOWN = 4000; 
    const NO_DETECTION_TIMEOUT = 10000; 

    // רשימת קטגוריות דינמית התחלתית (מפתח באנגלית, שם בעברית, וצבע כפתור)
    let laundryCategories = [
        { key: "shirt", name: "חולצה (Shirt)", color: "#3b82f6" },
        { key: "pants", name: "מכנסיים (Pants)", color: "#10b981" },
        { key: "socks", name: "גרביים (Socks)", color: "#f59e0b" },
        { key: "towel", name: "מגבת (Towel)", color: "#8b5cf6" }
    ];

    function writeLog(text) {
        logBox.innerHTML += `<div>[${new Date().toLocaleTimeString()}] ${text}</div>`;
        logBox.scrollTop = logBox.scrollHeight;
    }

    function speak(text) {
        if ('speechSynthesis' in window) {
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'he-IL';
            window.speechSynthesis.speak(utterance);
        }
    }

    // הפעלת מצלמה
    async function startCamera() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({
                video: { facingMode: "environment" },
                audio: false
            });
            video.srcObject = stream;
            video.style.display = "block";
            targetDot.style.display = "block";
        } catch (err) {
            const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
            video.srcObject = stream;
            video.style.display = "block";
            targetDot.style.display = "block";
        }
    }

    // תרגום מפתח קטגוריה לשם עברי תואם
    function getCategoryHebrewName(key) {
        const found = laundryCategories.find(cat => cat.key === key);
        return found ? found.name.split(' ')[0] : key;
    }

    // מיפוי בסיסי עבור המודל הגנרי של גוגל
    function mapPredictionToLaundry(label) {
        const l = label.toLowerCase();
        if (l.includes('jersey') || l.includes('t-shirt') || l.includes('tee shirt') || 
            l.includes('sweater') || l.includes('cardigan') || l.includes('sweatshirt')) {
            return { name: "חולצה (Shirt)", key: "shirt" };
        }
        if (l.includes('jeans') || l.includes('denim') || l.includes('trousers') || l.includes('pants')) {
            return { name: "מכנסיים (Pants)", key: "pants" };
        }
        if (l.includes('sock')) {
            return { name: "גרביים (Socks)", key: "socks" };
        }
        if (l.includes('towel') || l.includes('toweling')) {
            return { name: "מגבת (Towel)", key: "towel" };
        }
        return { name: "לא זוהה", key: "other" };
    }

    // אתחול המערכות
    async function initAI() {
        try {
            model = await mobilenet.load();
            knn = knnClassifier.create();
            loader.style.display = "none";
            detectionArea.style.display = "block";
            writeLog("מערכת למידה עצמית דינמית מוכנה!");
            lastLaundryDetectedTime = Date.now();
            renderModalButtons(); // יצירת כפתורי המודאל בפעם הראשונה
            detectFrame();
        } catch (err) {
            writeLog("שגיאה באתחול: " + err.message);
        }
    }

    // יצירת כפתורי הקטגוריות במודאל באופן דינמי
    function renderModalButtons() {
        modalButtonsContainer.innerHTML = "";

        // יצירת כפתור עבור כל קטגוריה קיימת ברשימה
        laundryCategories.forEach(cat => {
            const btn = document.createElement('button');
            btn.className = "modal-btn";
            btn.style.background = cat.color;
            btn.innerText = cat.name;
            btn.onclick = () => selectManualCategory(cat.key);
            modalButtonsContainer.appendChild(btn);
        });

        // כפתור הוספת קטגוריה מותאמת אישית חדשה
        const addNewBtn = document.createElement('button');
        addNewBtn.className = "modal-btn";
        addNewBtn.style.background = "#475569"; // צבע אפור כהה
        addNewBtn.style.gridColumn = "span 2";
        addNewBtn.innerText = "➕ קטגוריה חדשה...";
        addNewBtn.onclick = createNewCategory;
        modalButtonsContainer.appendChild(addNewBtn);

        // כפתור ביטול
        const cancelBtn = document.createElement('button');
        cancelBtn.className = "modal-btn";
        cancelBtn.style.background = "#ef4444"; // אדום
        cancelBtn.style.gridColumn = "span 2";
        cancelBtn.innerText = "ביטול / חזרה לסריקה";
        cancelBtn.onclick = closeManualModal;
        modalButtonsContainer.appendChild(cancelBtn);
    }

    // פונקציה ליצירת קטגוריה חדשה על ידי המשתמש
    function createNewCategory() {
        const rawName = prompt("הזן שם לקטגוריה החדשה (למשל: צעיף, תחתונים, נעליים):");
        if (!rawName) return;

        const sanitizedName = rawName.trim();
        if (sanitizedName === "") return;

        // יצירת מפתח ייחודי ובטוח לשם הקובץ (מסיר תווים מיוחדים ומחבר)
        const key = "custom_" + sanitizedName.replace(/[^a-zA-Z0-9א-ת]/g, "_");

        // בדיקה שלא קיימת קטגוריה עם אותו שם או מפתח
        if (laundryCategories.some(cat => cat.key === key || cat.name.split(' ')[0] === sanitizedName)) {
            alert("קטגוריה זו כבר קיימת ברשימה!");
            return;
        }

        // צבעים אקראיים יפים לכפתורים החדשים
        const randomColors = ["#06b6d4", "#ec4899", "#14b8a6", "#f43f5e", "#84cc16"];
        const randomColor = randomColors[Math.floor(Math.random() * randomColors.length)];

        // הוספה לרשימה הדינמית
        laundryCategories.push({
            key: key,
            name: `${sanitizedName} (מותאם)`,
            color: randomColor
        });

        writeLog(`➕ נוספה קטגוריה חדשה לרשימה: ${sanitizedName}`);
        speak(`נוספה קטגוריית ${sanitizedName}`);
        
        // ציור מחדש של הכפתורים במודאל
        renderModalButtons();
    }

    // לולאת הזיהוי
    async function detectFrame() {
        if (!model || !knn || isPaused) {
            requestAnimationFrame(detectFrame);
            return;
        }

        try {
            const activation = model.infer(video, true);
            
            let predictedLabel = "other";
            let probability = 0;
            let isKnnPrediction = false;

            // א. בדיקה במודל הלמידה העצמית המקומי
            if (knn.getNumClasses() > 0) {
                const knnResult = await knn.predictClass(activation);
                const topKnnClass = knnResult.label;
                const knnConfidence = knnResult.confidences[topKnnClass];

                if (knnConfidence > 0.70 && topKnnClass !== "other") {
                    predictedLabel = topKnnClass;
                    probability = knnConfidence;
                    isKnnPrediction = true;
                }
            }

            // ב. גיבוי במודל הגנרי של גוגל
            if (predictedLabel === "other") {
                const predictions = await model.classify(video);
                if (predictions && predictions.length > 0) {
                    const topPrediction = predictions[0];
                    const rawName = topPrediction.className;
                    const rawProb = topPrediction.probability;
                    const laundryMatch = mapPredictionToLaundry(rawName);

                    if (laundryMatch.key !== "other" && rawProb > 0.40) {
                        predictedLabel = laundryMatch.key;
                        probability = rawProb;
                    }
                }
            }

            activation.dispose();

            // ג. עדכון ממשק ושמירה
            if (predictedLabel !== "other") {
                lastLaundryDetectedTime = Date.now(); 
                
                const hebrewName = getCategoryHebrewName(predictedLabel);
                const sourceInfo = isKnnPrediction ? " (מתוך למידה עצמית 🧠)" : " (זיהוי גנרי)";
                
                mappedCategoryText.innerText = hebrewName + sourceInfo;
                mappedCategoryText.style.color = isKnnPrediction ? "#3b82f6" : "#16a34a"; 
                rawOutputText.innerText = `ודאות זיהוי: ${(probability * 100).toFixed(0)}%`;

                if (autoSaveToggle.checked) {
                    const now = Date.now();
                    if (predictedLabel !== lastSavedClass || (now - lastSaveTime > SAVE_COOLDOWN)) {
                        saveSnapshot(predictedLabel);
                        speak(`נשמרה ${hebrewName}`);
                        lastSavedClass = predictedLabel;
                        lastSaveTime = now;
                    }
                }
            } else {
                mappedCategoryText.innerText = "לא זוהה פריט ודאי";
                mappedCategoryText.style.color = "#64748b";
                rawOutputText.innerText = "מחפש פריטי כביסה...";

                if (Date.now() - lastLaundryDetectedTime > NO_DETECTION_TIMEOUT) {
                    triggerManualFallback();
                }
            }

        } catch (e) {}

        requestAnimationFrame(detectFrame);
    }

    // מנגנון כשל ידני
    function triggerManualFallback() {
        isPaused = true;
        writeLog("⚠️ לא זוהה פריט במשך 10 שניות. נא לבחור קטגוריה ללימוד.");
        speak("לא זיהיתי. נא לבחור קטגוריה ללימוד.");
        manualModal.style.display = "flex";
    }

    // בחירה ידנית המאמנת את המודל דינמית
    function selectManualCategory(category) {
        saveSnapshot(`learned_${category}`);
        
        const activation = model.infer(video, true);
        knn.addExample(activation, category);
        
        const hebrewName = getCategoryHebrewName(category);
        writeLog(`🧠 למידה עצמית: המודל למד שחפץ זה הוא "${hebrewName}"!`);
        speak(`למדתי ${hebrewName} ונשמר בהצלחה`);
        
        closeManualModal();
    }

    function closeManualModal() {
        manualModal.style.display = "none";
        lastLaundryDetectedTime = Date.now(); 
        isPaused = false;
    }

    // שמירת התמונה לגלריית המכשיר
    function saveSnapshot(label) {
        const canvas = document.createElement('canvas');
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

        // סימון ירוק לנקודת אחיזה של הזרוע הרובוטית במרכז התמונה
        ctx.fillStyle = "#10b981";
        ctx.beginPath();
        ctx.arc(canvas.width / 2, canvas.height / 2, 8, 0, 2 * Math.PI);
        ctx.fill();

        const imageURL = canvas.toDataURL("image/jpeg");
        const downloadLink = document.createElement('a');
        downloadLink.href = imageURL;
        
        const timestamp = Date.now();
        downloadLink.download = `${label}_${timestamp}.jpg`;
        
        document.body.appendChild(downloadLink);
        downloadLink.click();
        document.body.removeChild(downloadLink);

        writeLog(`📸 תמונה נשמרה בגלריה: ${label}`);
    }

    window.onload = async () => {
        await startCamera();
        await initAI();
    };
</script>

</body>
</html>
